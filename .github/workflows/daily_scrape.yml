name: Daily Vegetable Price Scraper

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  scrape_and_save:
    runs-on: ubuntu-latest # Sử dụng hệ điều hành Ubuntu mới nhất của GitHub
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas
          python -m playwright install chromium

      - name: Run Scraping Script
        run: python PricePrediction/crawl.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add PricePrediction/vegetable_prices.csv
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Daily vegetable prices $(date +'%Y-%m-%d')" && git push)
