name: Daily Vegetable Price Scraper

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch: 

jobs:
  scrape_and_save:
    runs-on: ubuntu-latest # Dùng hệ điều hành Linux của GitHub
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r PricePrediction/requirements.txt
          python -m playwright install chromium

      - name: Run Python script
        run: python PricePrediction/crawl.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          # Nếu không có gì mới thì bỏ qua, có thì commit
          git commit -m "Auto-update: Daily vegetable prices" || exit 0
          git push
